<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Collaboration Hub</title>
    <link rel="stylesheet" href="style.css">
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

<header>
    <h1>📚 Cyber Security Notes Hub</h1>
    <p>BCA Cyber Security - Sections A | B | C</p>
</header>

<section class="controls">
    <input type="text" id="search" placeholder="Search notes...">

    <select id="sectionFilter">
        <option value="">All Sections</option>
        <option value="A">Section A</option>
        <option value="B">Section B</option>
        <option value="C">Section C</option>
    </select>

    <select id="courseFilter">
        <option value="">All Courses</option>
        <option value="Cryptography">Cryptography</option>
        <option value="C Programming">C Programming</option>
        <option value="Ethical Hacking">Ethical Hacking</option>
        <option value="Python Programming">Python Programming</option>
        <option value="Data Structures">Data Structures</option>
        <option value="Cyber Security Essentials">Cyber Security Essentials</option>
    </select>
</section>

<section id="notesContainer" class="notes-container"></section>

<section class="upload">
    <h2>Upload Notes</h2>
    <form id="uploadForm">
        <input type="text" id="title" placeholder="Title" required>

        <select id="course" required>
            <option value="">Select Course</option>
            <option value="Cryptography">Cryptography</option>
            <option value="C Programming">C Programming</option>
            <option value="Ethical Hacking">Ethical Hacking</option>
            <option value="Python Programming">Python Programming</option>
            <option value="Data Structures">Data Structures</option>
            <option value="Cyber Security Essentials">Cyber Security Essentials</option>
        </select>

        <select id="section" required>
            <option value="">Select Section</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
        </select>

        <input type="file" id="file" required>

        <button type="submit">Upload</button>
    </form>
</section>

<script src="script.js"></script>
</body>
</html>
